version: "3.9"

services:
  backend:
    build:
      context: ./backend_rewrite
      dockerfile: Dockerfile
    container_name: assistgen-rewrite-backend
    ports:
      - "8100:8100"
    environment:
      ASSISTGEN_DB_PATH: /app/data/assistgen.sqlite3
      ASSISTGEN_CONVERSATION_STORE: sqlite
      ASSISTGEN_LLM_PROVIDER: ${ASSISTGEN_LLM_PROVIDER:-mock}
      ASSISTGEN_LLM_BASE_URL: ${ASSISTGEN_LLM_BASE_URL:-}
      ASSISTGEN_LLM_API_KEY: ${ASSISTGEN_LLM_API_KEY:-}
      ASSISTGEN_LLM_DEFAULT_MODEL: ${ASSISTGEN_LLM_DEFAULT_MODEL:-deepseek-chat}
      ASSISTGEN_LLM_TIMEOUT_SECONDS: ${ASSISTGEN_LLM_TIMEOUT_SECONDS:-60}
    volumes:
      - ./backend_rewrite/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend_rewrite
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ''
    container_name: assistgen-rewrite-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped


